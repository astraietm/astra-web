services:
  - type: web
    name: astra-backend
    env: python
    plan: free
    region: singapore
    rootDir: apps/api
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate && gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FORCE_SYNC
        value: "false"